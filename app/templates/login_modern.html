{% extends "base_tabler.html" %}

{% block content %}
    <div class="page page-center">
      <div class="container py-4" style="max-width: 400px; margin-top: 5rem;">
        <div class="text-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="-14 -14 128 128" class="breeder-head-svg slh-logo text-primary">
  <circle cx="50" cy="50" r="64" fill="#ffffff" />
  <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, -6)">
    <path d="m78.14 54.345 0.0026-0.28244c-0.0283 5.3531-0.97265 7.988-3.9396 12.32 0 0 0.46373 3.5974 1.0821 5.6 1.0595 3.4311 3.2798 6.8098 4.3272 10.4 2.0178 6.9167 1.0516 14.202-6.0322 15.69" stroke-width="2.6457"/>
    <path class="slh-eye" d="m65.286 56.508 0.05668 0.07851" stroke-width="7.5591"/>
    <path d="m36.428 46.586c-4.3086 3.3052-12.213 18.443-14.207 22.975-3.3406 7.5952-4.0449 13.587-5.142 23.537" stroke-width="2.6457"/>
    <path d="m78.152 53.839c-1.965-6.7001-9.8729-14.401-20.105-14.614-6.0786-0.12664-12.418 2.4074-17.6 5.2086-2.3866 1.2901-4.2248 2.6267-7.2 1.7926-6.5183-1.8275-11.381-14.927-5.3772-20.378 3.0047-2.7277 8.4544 0.26719 9.7865 2.1708-0.11421-2.8074 0.17607-8.4781 3.0135-10.641 4.3843-3.3414 10.195 3.6196 11.963 5.9337 0.75757-2.9175 2.9364-8.474 7.0257-8.5769 5.4617-0.13744 9.8604 10.598 10.637 10.633 0.63106 0.02814 1.137-6.6833 4.5926-5.7878 3.8393 0.99495 6.945 9.2974 7.3992 11.31 0.41019 1.8173 1.0486 6.6207 0.71243 9.0916-0.83596 6.1454-1.5141 11.284-4.8478 13.894 2.2642-0.08264 4.323 2.3963 7.4699 4.9891 0.74514 0.61392 5.4132 4.645 6.768 8.1934 0.85452 2.2382-7.5759-0.61032-13.543-1.208-2.2242-0.22276-3.9924-0.25544-6.4 0.34136-2.0416 0.50606-3.0152 1.1589-4.7969 2.7056-6.1463 5.3354-10.377 15.576-6.7451 23.081 2.868 5.9265 7.7202 7.5046 13.142 5.9752 0.33347 3.8243 1.9984 7.5108 2.4 12.428" stroke-width="2.6457"/>  </g>
</svg>
          <h1 class="text-primary display-4 mt-3">SLH-OP</h1>
        </div>
        <div class="card card-md shadow-sm border-0">
          <div class="card-body">
            <h2 class="h2 text-center mb-4">Login to your account</h2>

            {# Flash messages are already handled by base_tabler.html #}

            <form action="{{ url_for('login') }}" method="POST" autocomplete="off" novalidate>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
              </div>
              <div class="mb-2">
                <label class="form-label">
                  Password
                </label>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
              </div>
              <div class="mb-3">
                <label class="form-check">
                  <input type="checkbox" name="remember" class="form-check-input"/>
                  <span class="form-check-label">Remember me on this device</span>
                </label>
              </div>
              <div class="form-footer">
                <button type="submit" class="btn btn-primary w-100">Sign in</button>
              </div>
            </form>
          </div>
        </div>
        <div class="text-center text-muted mt-4" style="font-size: 0.75rem; opacity: 0.6;">
          <p class="mb-1">Syarikat Sin Long Heng Breeding Farm Sdn Bhd</p>
          <p class="mb-1"><strong>System Status:</strong> Online | <strong>Last Update:</strong> {{ build_date }}</p>
          <p class="mt-1">Build ID: v{{ version }}</p>
        </div>
      </div>
    </div>
{% endblock %}
