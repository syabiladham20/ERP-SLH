{% extends 'base_tabler.html' %}

{% block content %}
<div class="container-xl">
    <div class="row align-items-center mb-3">
        <div class="col">
            <h2 class="page-title">New Broiler Flock</h2>
        </div>
        <div class="col-auto ms-auto d-print-none">
            <a href="{{ url_for('broiler.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('broiler.new_flock') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row row-cards">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label required">Farm Name</label>
                            <input type="text" class="form-control" name="farm_name" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label required">House Name</label>
                            <input type="text" class="form-control" name="house_name" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Source</label>
                            <input type="text" class="form-control" name="source">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Breed</label>
                            <input type="text" class="form-control" name="breed">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label required">Intake Birds</label>
                            <input type="number" class="form-control" name="intake_birds" min="0" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label required">Intake Date</label>
                            <input type="date" class="form-control" name="intake_date" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label required">Arrival Weight (g)</label>
                            <input type="number" step="0.01" class="form-control" name="arrival_weight_g" value="0.0" required>
                        </div>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn btn-primary w-100">Create Flock</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
