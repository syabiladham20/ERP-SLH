{% extends "base_tabler.html" %}

{% block content %}
<div class="page-header d-print-none mb-3">
  <div class="row align-items-center">
    <div class="col">
      <h2 class="page-title">
        Spreadsheet View - {{ flock.house.name }}
      </h2>
    </div>
    <div class="col-auto ms-auto d-print-none">
      <div class="btn-list">
        <button id="addRowBtn" class="btn btn-info text-white d-none d-sm-inline-block">+ Add Row</button>
        <button id="saveBtn" class="btn btn-primary d-none d-sm-inline-block">Save Changes</button>
        <a href="{{ url_for('view_flock', id=flock.id) }}" class="btn btn-outline-secondary d-none d-sm-inline-block">Back to Flock</a>

        <!-- Mobile Toggle Button -->
        <button class="btn btn-primary d-sm-none" id="toggleViewBtn">Switch to Card View</button>
        <button id="saveBtnMobile" class="btn btn-success d-sm-none">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Hybrid UI: Mobile Cards Wrapper -->
<div id="mobileCardView" class="d-none mb-4">
    <!-- Search / Filter for Cards -->
    <div class="mb-3">
        <input type="text" id="cardSearch" class="form-control" placeholder="Search by Date (YYYY-MM-DD)...">
    </div>
    <div id="cardsContainer" class="row row-cards">
        <!-- Cards will be generated here by JS -->
    </div>
</div>

<div class="container-xl d-none d-sm-block" id="spreadsheetWrapper">
    <div id="spreadsheet" style="width: 100%; height: 700px; overflow: auto; border: 1px solid #ccc; background: white;" class="shadow-sm rounded"></div>
</div>

<!-- Jspreadsheet CSS and JS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.13.3/dist/jspreadsheet.min.css" type="text/css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@4.3.2/dist/jsuites.min.css" type="text/css" />

<style>
    /* Custom styles to differentiate readonly cells */
    .readonly {
        background-color: #f8f9fa !important;
        color: #6c757d !important;
    }
    .benchmark {
        background-color: #e2e3e5 !important;
        color: #495057 !important;
        font-style: italic;
    }

    /* Ensure the container takes up space */
    #spreadsheet {
        display: block;
        min-height: 500px;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.13.3/dist/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsuites@4.3.2/dist/jsuites.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log("DOM loaded. Initializing Jspreadsheet.");

    const spreadsheetData = {{ spreadsheet_data | tojson | safe }};
    const flockId = {{ flock.id }};

    if (typeof jspreadsheet === 'undefined') {
        console.error("jspreadsheet is not defined! The script may not have loaded correctly.");
        return;
    }

    console.log("Data loaded:", spreadsheetData.length, "rows.");

    const feedCodesSource = {{ feed_codes | tojson | safe }};

    const columns = [
        { type: 'hidden', title: 'ID', name: 'id', width: 0, readOnly: true },
        { type: 'calendar', title: 'Date', name: 'date', width: 100, options: { format: 'YYYY-MM-DD' } },
        { type: 'numeric', title: 'Age (Days)', name: 'age_days', width: 80, readOnly: true },

        { type: 'text', title: 'Clinical Signs', name: 'clinical_signs', width: 200 },

        // Mortality & Culls
        { type: 'numeric', title: 'Mortality (M)', name: 'mortality_male', width: 100 },
        { type: 'numeric', title: 'Mortality (F)', name: 'mortality_female', width: 100 },
        { type: 'numeric', title: 'Hosp Mort (M)', name: 'mortality_male_hosp', width: 100 },
        { type: 'numeric', title: 'Hosp Mort (F)', name: 'mortality_female_hosp', width: 100 },

        { type: 'numeric', title: 'Culls (M)', name: 'culls_male', width: 80 },
        { type: 'numeric', title: 'Culls (F)', name: 'culls_female', width: 80 },
        { type: 'numeric', title: 'Hosp Culls (M)', name: 'culls_male_hosp', width: 100 },
        { type: 'numeric', title: 'Hosp Culls (F)', name: 'culls_female_hosp', width: 100 },

        // Transfers
        { type: 'numeric', title: 'Moved to Hosp (M)', name: 'males_moved_to_hosp', width: 120 },
        { type: 'numeric', title: 'Moved to Hosp (F)', name: 'females_moved_to_hosp', width: 120 },
        { type: 'numeric', title: 'Moved to Prod (M)', name: 'males_moved_to_prod', width: 120 },
        { type: 'numeric', title: 'Moved to Prod (F)', name: 'females_moved_to_prod', width: 120 },
        { type: 'numeric', title: 'In Flock (M)', name: 'males_in_flock', width: 100 },
        { type: 'numeric', title: 'Out Flock (M)', name: 'males_out_flock', width: 100 },
        { type: 'numeric', title: 'In Flock (F)', name: 'females_in_flock', width: 100 },
        { type: 'numeric', title: 'Out Flock (F)', name: 'females_out_flock', width: 100 },

        // Feed
        { type: 'dropdown', title: 'Feed Program', name: 'feed_program', width: 120, source: ['Full Feed', 'Skip-a-day', '2/1'], autocomplete: false, strict: true },
        { type: 'dropdown', title: 'Feed Code (M)', name: 'feed_code_male', width: 120, source: feedCodesSource, autocomplete: false, strict: true },
        { type: 'dropdown', title: 'Feed Code (F)', name: 'feed_code_female', width: 120, source: feedCodesSource, autocomplete: false, strict: true },
        { type: 'numeric', title: 'Feed (g/bird M)', name: 'feed_male_gp_bird', width: 110 },
        { type: 'numeric', title: 'Feed (g/bird F)', name: 'feed_female_gp_bird', width: 110 },
        { type: 'text', title: 'Feed Cleanup Start', name: 'feed_cleanup_start', width: 120 },
        { type: 'text', title: 'Feed Cleanup End', name: 'feed_cleanup_end', width: 120 },

        // Water
        { type: 'numeric', title: 'Water 1', name: 'water_reading_1', width: 80 },
        { type: 'numeric', title: 'Water 2', name: 'water_reading_2', width: 80 },
        { type: 'numeric', title: 'Water 3', name: 'water_reading_3', width: 80 },
        { type: 'checkbox', title: 'Flushing', name: 'flushing', width: 80 },

        // Production
        { type: 'numeric', title: 'Eggs Collected', name: 'eggs_collected', width: 110 },
        { type: 'numeric', title: 'Egg Weight', name: 'egg_weight', width: 90 },
        { type: 'numeric', title: 'Eggs Jumbo', name: 'cull_eggs_jumbo', width: 90 },
        { type: 'numeric', title: 'Eggs Small', name: 'cull_eggs_small', width: 90 },
        { type: 'numeric', title: 'Eggs Abnormal', name: 'cull_eggs_abnormal', width: 100 },
        { type: 'numeric', title: 'Eggs Crack', name: 'cull_eggs_crack', width: 90 },

        // BW & Uniformity
        { type: 'checkbox', title: 'Weighing Day', name: 'is_weighing_day', width: 100 },
        { type: 'numeric', title: 'Avg BW (M)', name: 'body_weight_male', width: 90 },
        { type: 'numeric', title: 'Avg BW (F)', name: 'body_weight_female', width: 90 },
        { type: 'numeric', title: 'Avg Unif (M)', name: 'uniformity_male', width: 90 },
        { type: 'numeric', title: 'Avg Unif (F)', name: 'uniformity_female', width: 90 },
        { type: 'numeric', title: 'Std BW (M)', name: 'standard_bw_male', width: 90 },
        { type: 'numeric', title: 'Std BW (F)', name: 'standard_bw_female', width: 90 },

        // Partitions
        // M1-M8 BW and Uni
        {% for i in range(1, 9) %}
        { type: 'numeric', title: 'M{{i}} BW', name: 'bw_M{{i}}', width: 80 },
        { type: 'numeric', title: 'M{{i}} Unif', name: 'uni_M{{i}}', width: 80 },
        {% endfor %}

        // F1-F8 BW and Uni
        {% for i in range(1, 9) %}
        { type: 'numeric', title: 'F{{i}} BW', name: 'bw_F{{i}}', width: 80 },
        { type: 'numeric', title: 'F{{i}} Unif', name: 'uni_F{{i}}', width: 80 },
        {% endfor %}

        { type: 'text', title: 'Light On', name: 'light_on_time', width: 80 },
        { type: 'text', title: 'Light Off', name: 'light_off_time', width: 80 },

        // Readonly/Benchmark fields
        { type: 'numeric', title: 'Std Mort %', name: 'std_mortality', width: 100, readOnly: true },
        { type: 'numeric', title: 'Std Egg Prod %', name: 'std_egg_prod', width: 120, readOnly: true },
        { type: 'numeric', title: 'Std BW (M) Bench', name: 'bench_std_bw_male', width: 100, readOnly: true },
        { type: 'numeric', title: 'Std BW (F) Bench', name: 'bench_std_bw_female', width: 100, readOnly: true }
    ];

    try {
        const mySpreadsheet = jspreadsheet(document.getElementById('spreadsheet'), {
            data: spreadsheetData,
            columns: columns,
            search: true,
            pagination: 50,
            columnDrag: true,
            updateTable: function(instance, cell, col, row, val, label, cellName) {
                // Apply styling to readOnly columns
                const colDef = columns[col];
                if (colDef && colDef.readOnly) {
                    if (colDef.name && colDef.name.startsWith('std_')) {
                        cell.classList.add('benchmark');
                    } else {
                        cell.classList.add('readonly');
                    }
                }
            }
        });
        console.log("Jspreadsheet initialized successfully");

        // --- Mobile Hybrid UI Logic ---
        const mobileCardView = document.getElementById('mobileCardView');
        const spreadsheetWrapper = document.getElementById('spreadsheetWrapper');
        const toggleViewBtn = document.getElementById('toggleViewBtn');
        const cardsContainer = document.getElementById('cardsContainer');

        let isCardView = false;

        // Detect initial load on mobile
        if (window.innerWidth < 576) {
            isCardView = true;
            spreadsheetWrapper.classList.replace('d-sm-block', 'd-none');
            mobileCardView.classList.remove('d-none');
            toggleViewBtn.innerText = 'Switch to Grid View';
            renderCards();
        }

        toggleViewBtn.addEventListener('click', function() {
            isCardView = !isCardView;
            if (isCardView) {
                spreadsheetWrapper.classList.add('d-none');
                spreadsheetWrapper.classList.remove('d-sm-block');
                mobileCardView.classList.remove('d-none');
                this.innerText = 'Switch to Grid View';
                renderCards();
            } else {
                mobileCardView.classList.add('d-none');
                spreadsheetWrapper.classList.remove('d-none');
                spreadsheetWrapper.classList.add('d-sm-block');
                this.innerText = 'Switch to Card View';
            }
        });

        window.updateSpreadsheetData = function(rowIndex, colIndex, value) {
            mySpreadsheet.setValueFromCoords(colIndex, rowIndex, value, true);
        };

        document.getElementById('addRowBtn').addEventListener('click', function() {
            let nextDateStr = "";
            let currentData = mySpreadsheet.getData();
            if (currentData.length > 0) {
                // Get the last row's date
                let lastDateVal = currentData[currentData.length - 1][1]; // Assuming date is index 1
                if (lastDateVal && typeof lastDateVal === 'string' && lastDateVal.includes('-')) {
                    let parts = lastDateVal.split('-');
                    let d = new Date(parts[0], parts[1] - 1, parts[2]);
                    if (!isNaN(d.getTime())) {
                        d.setDate(d.getDate() + 1);
                        let month = '' + (d.getMonth() + 1);
                        let day = '' + d.getDate();
                        let year = d.getFullYear();

                        if (month.length < 2) month = '0' + month;
                        if (day.length < 2) day = '0' + day;

                        nextDateStr = [year, month, day].join('-');
                    }
                }
            }

            if (!nextDateStr) {
                // Default to today if no rows or parsing failed
                let d = new Date();
                let month = '' + (d.getMonth() + 1);
                let day = '' + d.getDate();
                let year = d.getFullYear();

                if (month.length < 2) month = '0' + month;
                if (day.length < 2) day = '0' + day;
                nextDateStr = [year, month, day].join('-');
            }

            let newRow = new Array(columns.length).fill('');
            newRow[1] = nextDateStr; // Set date column

            mySpreadsheet.insertRow(newRow);

            // Scroll to bottom
            const tableDiv = document.getElementById('spreadsheet').querySelector('.jspreadsheet-content');
            if (tableDiv) {
                tableDiv.scrollTop = tableDiv.scrollHeight;
            }
        });

        function renderCards(filterText = '') {
            cardsContainer.innerHTML = '';
            const data = mySpreadsheet.getData();

            data.forEach((row, rowIndex) => {
                const dateStr = row[1];
                if (filterText && !dateStr.includes(filterText)) return;

                const card = document.createElement('div');
                card.className = 'col-12';

                // Editable fields mapping based on jspreadsheet columns index
                const fields = [
                    { idx: 4, label: 'Mort M', type: 'number' },
                    { idx: 5, label: 'Mort F', type: 'number' },
                    { idx: 11, label: 'Eggs Collected', type: 'number' },
                    { idx: 16, label: 'Feed M', type: 'number' },
                    { idx: 17, label: 'Feed F', type: 'number' },
                    { idx: 3, label: 'Clinical Signs', type: 'text' }
                ];

                let fieldsHtml = '';
                fields.forEach(f => {
                    fieldsHtml += `
                        <div class="mb-2 col-6">
                            <label class="form-label small text-muted mb-1">${f.label}</label>
                            <input type="${f.type}" class="form-control form-control-sm" value="${row[f.idx] || ''}" onchange="updateSpreadsheetData(${rowIndex}, ${f.idx}, this.value)">
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="card shadow-sm border-0 mb-2">
                        <div class="card-header py-2 bg-light d-flex justify-content-between">
                            <h4 class="card-title m-0">Date: ${dateStr}</h4>
                            <span class="badge bg-secondary text-white">Day ${row[2]}</span>
                        </div>
                        <div class="card-body py-2">
                            <div class="row g-2">
                                ${fieldsHtml}
                            </div>
                        </div>
                    </div>
                `;
                cardsContainer.appendChild(card);
            });
        }

        document.getElementById('cardSearch').addEventListener('input', function(e) {
            renderCards(e.target.value);
        });

        // Save functionality
        function handleSave(btnElement) {
            btnElement.disabled = true;
            const originalText = btnElement.textContent;
            btnElement.textContent = 'Saving...';

            const rawData = mySpreadsheet.getData();
            const payload = [];

            for (let i = 0; i < rawData.length; i++) {
                const row = rawData[i];
                const rowObj = {};
                for (let j = 0; j < columns.length; j++) {
                    rowObj[columns[j].name] = row[j] !== '' ? row[j] : null;
                }
                payload.push(rowObj);
            }

            fetch('{{ url_for("flock_spreadsheet_save", flock_id=0) }}'.replace('0', flockId), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ data: payload })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (typeof showToast === 'function') {
                        showToast('Changes saved successfully!', 'success');
                    } else {
                        alert('Changes saved successfully!');
                    }
                } else {
                    if (typeof showToast === 'function') {
                        showToast('Error saving changes: ' + (data.error || 'Unknown error'), 'error');
                    } else {
                        alert('Error saving changes: ' + (data.error || 'Unknown error'));
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                if (typeof showToast === 'function') {
                    showToast('An error occurred while saving.', 'error');
                } else {
                    alert('An error occurred while saving.');
                }
            })
            .finally(() => {
                btnElement.disabled = false;
                btnElement.textContent = originalText;
            });
        }

        document.getElementById('saveBtn').addEventListener('click', function() { handleSave(this); });
        document.getElementById('saveBtnMobile').addEventListener('click', function() { handleSave(this); });

    } catch (e) {
        console.error("Error initializing jspreadsheet:", e);
    }
});
</script>
{% endblock %}
