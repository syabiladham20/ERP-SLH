<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Offline - SLH-OP</title>
    <!-- Tabler Core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#005eb8">
    <style>
        :root {
            --tblr-primary: #005eb8; /* Arbor Acres Blue */
        }
        body {
            background-color: #f8f9fa;
        }
        .empty {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .breeder-head-svg {
            color: #005eb8;
        }
    </style>
  </head>
  <body class="border-top-wide border-primary d-flex flex-column">
    <div class="page page-center">
      <div class="container-tight py-4">
        <div class="empty">
          <div class="empty-icon mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 100 100" class="breeder-head-svg slh-logo text-primary">
  <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path class="comb-path" d="M 34 46 C 25 35 25 15 45 20 C 50 5 70 5 75 25 C 85 25 85 45 68 47" />
    <path class="profile-path" d="M 28 65 C 28 35 45 35 60 35 C 65 35 70 38 75 42 C 80 44 85 46 90 50 L 68 52" />
    <path class="wattle-path" d="M 68 52 C 55 55 55 75 62 82 C 70 90 85 75 75 60 C 73 55 68 52 68 52 Z" />
    <path class="wattle-path" d="M 70 82 L 72 95" />
    <circle cx="62" cy="42" r="4" fill="currentColor" stroke="none" class="eye-path" />
  </g>
</svg>
          </div>
          <p class="empty-title h3 mb-2">Offline Mode</p>
          <p class="empty-subtitle text-muted mb-4 px-3" style="max-width: 400px; text-align: center;">
            Connection lost, but your UI is ready. Please move to a high-signal area to sync VA1/VA3 logs.
          </p>
          <div class="empty-action">
            <button class="btn btn-primary" onclick="window.location.reload()">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" />
                <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" />
              </svg>
              Try Again
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
