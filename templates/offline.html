<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Offline - SLH-OP</title>
    <!-- Tabler Core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#005eb8">
    <style>
        :root {
            --tblr-primary: #005eb8; /* Arbor Acres Blue */
        }
        body {
            background-color: #f8f9fa;
        }
        .empty {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .breeder-head-svg {
            color: #005eb8;
        }
    </style>
  </head>
  <body class="border-top-wide border-primary d-flex flex-column">
    <div class="page page-center">
      <div class="container-tight py-4">
        <div class="empty">
          <div class="empty-icon mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 100 100" class="breeder-head-svg slh-rooster-outline">
  <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path class="profile-path" d="
      M 90,85
      C 95,65 92,50 85,35
      C 80,25 70,18 60,15
      C 55,14 50,15 45,18
      M 45,18
      C 42,10 35,5 25,8
      C 20,9 15,12 12,18
      M 12,18
      C 5,25 2,35 5,45
      C 6,50 10,55 15,58
      M 15,58
      C 18,65 22,70 28,73
      C 35,76 45,75 52,70
      M 52,70
      C 55,75 60,80 68,82
      C 75,83 85,85 90,85
      Z" />

    <path class="comb-path" d="
      M 28,17
      C 26,10 28,5 32,3
      C 35,2 38,4 40,8
      M 40,8
      C 42,2 48,0 52,2
      C 55,3 57,6 58,10
      M 58,10
      C 62,4 68,4 72,8
      C 75,10 77,14 76,18
      M 76,18
      C 82,14 88,16 90,22
      C 91,26 89,32 85,36" />

    <path class="wattle-path" d="M 5,45 C 0,47 -2,52 2,56 L 15,58" />

    <path class="wattle-path" d="M 18,59 C 15,70 18,80 28,83 C 35,85 45,82 48,73" />

    <circle cx="28" cy="38" r="4" fill="currentColor" stroke="none"/>
    <path d="M 23,32 C 25,29 31,29 33,32" stroke-width="2"/>

    <path class="profile-path" d="M 65,35 C 70,45 72,55 70,65" stroke-opacity="0.5"/>
    <path class="profile-path" d="M 75,40 C 80,50 81,60 80,70" stroke-opacity="0.5"/>
  </g>
</svg>
          </div>
          <p class="empty-title h3 mb-2">Offline Mode</p>
          <p class="empty-subtitle text-muted mb-4 px-3" style="max-width: 400px; text-align: center;">
            Connection lost, but your UI is ready. Please move to a high-signal area to sync VA1/VA3 logs.
          </p>
          <div class="empty-action">
            <button class="btn btn-primary" onclick="window.location.reload()">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" />
                <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" />
              </svg>
              Try Again
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
