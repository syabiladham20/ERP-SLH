{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<div class="container mt-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-2" style="position: relative; z-index: 1;">
        <h2 class="h4 mb-2 mb-md-0">Hatchability Performance: {{ flock.house.name }}</h2>
        <div class="d-flex gap-2 align-items-center">
            <div class="input-group input-group-sm">
                <span class="input-group-text bg-white"><i class="bi bi-calendar-event"></i> Start</span>
                <input type="text" id="startDateSlicer" class="form-control" placeholder="Start Date">
                <span class="input-group-text bg-white"><i class="bi bi-calendar-event"></i> End</span>
                <input type="text" id="endDateSlicer" class="form-control" placeholder="End Date">
            </div>
            <span id="ageRangeDisplay" class="fw-bold text-primary small ms-2 text-nowrap"></span>
            <a href="{{ url_for('hatchery_dashboard') }}" class="btn btn-secondary btn-sm ms-2">Back</a>
        </div>
    </div>

    <div class="card p-3 shadow-sm" style="overflow-x: auto;">
        <div style="position: relative; height: 60vh; min-height: 500px; width: 100%; min-width: 800px;">
            <canvas id="hatchChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script>
    Chart.register(ChartDataLabels);
    // Fix for zoom clipping
    if (Chart.defaults.datasets.line) Chart.defaults.datasets.line.clip = true;
    if (Chart.defaults.datasets.bar) Chart.defaults.datasets.bar.clip = true;
    if (Chart.defaults.datasets.scatter) Chart.defaults.datasets.scatter.clip = true;

    const fullChartData = {{ data | tojson }};
    const intakeDateStr = "{{ flock.intake_date }}";
    const intakeDate = new Date(intakeDateStr);
    let hatchChart;
    let globalStartDate = null;
    let globalEndDate = null;

    function calculateAgeWeeks(dateObj) {
        if (!intakeDate) return 0;
        const diffTime = Math.abs(dateObj - intakeDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        return Math.floor(diffDays / 7) + 1;
    }

    // Calculate Y Max Options
    function getOptions(values, isPercentage) {
        const valid = values.filter(v => v !== null && v !== undefined && !isNaN(v));
        if (!valid || valid.length === 0) return {min: 0, suggestedMax: isPercentage ? 100 : 10};
        const maxVal = Math.max(...valid);
        let limit = maxVal * 1.25;
        if (limit === 0) return {min: 0, suggestedMax: isPercentage ? 100 : 1};

        if (isPercentage && limit > 100) return {min: 0, max: 100};
        return {min: 0, suggestedMax: limit};
    }

    function renderChart() {
        let data = fullChartData;

        // Filtering Logic by Date (Age Weeks)
        if (globalStartDate && globalEndDate) {
            const startAge = calculateAgeWeeks(globalStartDate);
            const endAge = calculateAgeWeeks(globalEndDate);

            // fullChartData.weeks contains strings "Week X" or numbers?
            // Usually "Week 25". Let's parse.

            const indices = [];
            const weeksArr = fullChartData.weeks || [];
            weeksArr.forEach((w, i) => {
                let weekNum = w;
                if (typeof w === 'string') {
                    const match = w.match(/(\d+)/);
                    if (match) weekNum = parseInt(match[1]);
                }

                if (weekNum >= startAge && weekNum <= endAge) {
                    indices.push(i);
                }
            });

            if (indices.length > 0) {
                const start = indices[0];
                const end = indices[indices.length - 1] + 1;

                const sliced = {};
                for (let key in fullChartData) {
                    if (Array.isArray(fullChartData[key])) {
                        sliced[key] = fullChartData[key].slice(start, end);
                    } else {
                        sliced[key] = fullChartData[key];
                    }
                }
                data = sliced;
            } else {
                // Empty
                const sliced = {};
                for (let key in fullChartData) {
                    if (Array.isArray(fullChartData[key])) {
                        sliced[key] = [];
                    }
                }
                data = sliced;
            }
        }

        const fertile = data.fertile_pct || [];
        const clear = data.clear_pct || [];
        const rotten = data.rotten_pct || [];
        const hatch = data.hatch_pct || [];
        const male = data.male_ratio_pct || [];
        const stdHatch = data.std_hatch_pct || [];

        // Calculate Stacked Max
        const stackedSums = fertile.map((v, i) => (v||0) + (clear[i]||0) + (rotten[i]||0));
        const yOptions = getOptions(stackedSums, true);
        const y1Values = [...hatch, ...male, ...stdHatch];
        const y1Options = getOptions(y1Values, true);

        if (hatchChart) hatchChart.destroy();

        const ctx = document.getElementById('hatchChart').getContext('2d');
        hatchChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.weeks,
                datasets: [
                    {
                        label: 'Std Hatchability %',
                        data: data.std_hatch_pct,
                        type: 'line',
                        borderColor: '#198754', // Bootstrap Success Green
                        borderDash: [5, 5],
                        pointRadius: 0,
                        borderWidth: 2,
                        yAxisID: 'y1',
                        order: 0,
                        datalabels: { display: false }
                    },
                    {
                        label: 'Fertile %',
                        data: data.fertile_pct,
                        backgroundColor: 'rgba(75, 192, 192, 0.7)',
                        stack: 'Stack 0',
                        order: 2,
                        datalabels: {
                            anchor: 'center',
                            align: 'center',
                            formatter: (value) => value > 0 ? value + '%' : ''
                        }
                    },
                    {
                        label: 'Clear %',
                        data: data.clear_pct,
                        backgroundColor: 'rgba(255, 205, 86, 0.7)',
                        stack: 'Stack 0',
                        order: 2,
                        datalabels: {
                            anchor: 'center',
                            align: 'center',
                            formatter: (value) => value > 0 ? value + '%' : ''
                        }
                    },
                    {
                        label: 'Rotten %',
                        data: data.rotten_pct,
                        backgroundColor: 'rgba(255, 99, 132, 0.7)',
                        stack: 'Stack 0',
                        order: 2,
                        datalabels: {
                            anchor: 'center',
                            align: 'center',
                            formatter: (value) => value > 0 ? value + '%' : ''
                        }
                    },
                    {
                        label: 'Hatchability %',
                        data: data.hatch_pct,
                        type: 'line',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        backgroundColor: 'rgba(54, 162, 235, 0.2)',
                        borderWidth: 3,
                        yAxisID: 'y1',
                        order: 1,
                        tension: 0.3,
                        datalabels: {
                            anchor: 'start',
                            align: 'bottom',
                            formatter: (value) => value > 0 ? value + '%' : ''
                        }
                    },
                    {
                        label: 'Male Ratio %',
                        data: data.male_ratio_pct,
                        type: 'line',
                        borderColor: 'rgba(153, 102, 255, 1)',
                        backgroundColor: 'rgba(153, 102, 255, 0.2)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        pointStyle: 'circle',
                        pointRadius: 4,
                        yAxisID: 'y1',
                        order: 0,
                        tension: 0.3,
                        datalabels: {
                            anchor: 'start',
                            align: 'bottom',
                            backgroundColor: 'rgba(255, 255, 255, 0.7)',
                            borderRadius: 4,
                            formatter: (value) => value > 0 ? value + '%' : ''
                        }
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            usePointStyle: true,
                            padding: 20
                        }
                    },
                    zoom: {
                        zoom: {
                          wheel: { enabled: true },
                          pinch: { enabled: true },
                          mode: 'x',
                        },
                        pan: {
                          enabled: true,
                          mode: 'x',
                        }
                    },
                    title: {
                        display: true,
                        text: 'Egg Breakdown & Hatchability Trend'
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            footer: function(tooltipItems) {
                                const index = tooltipItems[0].dataIndex;
                                const note = data.notes[index];
                                if (note) {
                                    return note.split(' | ');
                                }
                                return '';
                            }
                        }
                    },
                    datalabels: {
                        color: 'black',
                        font: {
                            weight: 'bold'
                        }
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Flock Age'
                        }
                    },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        stacked: true,
                        title: {
                            display: true,
                            text: 'Egg Status %'
                        },
                        ...yOptions
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        grid: {
                            drawOnChartArea: false
                        },
                        title: {
                            display: true,
                            text: 'Hatchability %'
                        },
                        ...y1Options
                    }
                }
            }
        });
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date();
        const last70 = new Date(); // Hatchery charts are weekly, 10 weeks = 70 days
        last70.setDate(today.getDate() - 70);

        // Initialize global vars immediately
        globalStartDate = last70;
        globalEndDate = today;

        const commonFlatpickrConfig = {
            dateFormat: "Y-m-d",
            disableMobile: "true",
            onChange: function(selectedDates, dateStr, instance) {
                updateDateRangeAndRender();
            }
        };

        const fpStart = flatpickr("#startDateSlicer", {
            ...commonFlatpickrConfig,
            defaultDate: last70
        });

        const fpEnd = flatpickr("#endDateSlicer", {
            ...commonFlatpickrConfig,
            defaultDate: today
        });

        function updateDateRangeAndRender() {
            const startDates = fpStart.selectedDates;
            const endDates = fpEnd.selectedDates;

            if (startDates.length > 0 && endDates.length > 0) {
                globalStartDate = startDates[0];
                globalEndDate = endDates[0];

                // Update Age Display
                const startAge = calculateAgeWeeks(globalStartDate);
                const endAge = calculateAgeWeeks(globalEndDate);
                document.getElementById('ageRangeDisplay').innerText = `Age: W${startAge} - W${endAge}`;

                renderChart();
            }
        }

        // Initial Render Logic
        const startAge = calculateAgeWeeks(globalStartDate);
        const endAge = calculateAgeWeeks(globalEndDate);
        document.getElementById('ageRangeDisplay').innerText = `Age: W${startAge} - W${endAge}`;
        renderChart();
    });
</script>
{% endblock %}
