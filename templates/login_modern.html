{% extends "base_tabler.html" %}

{% block content %}
    <div class="page page-center">
      <div class="container py-4" style="max-width: 400px; margin-top: 5rem;">
        <div class="text-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 100 100" class="breeder-head-svg slh-logo text-primary">
  <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 40,36 C 31,36 29,22 39,18 C 45,15.5 48.5,17 51,21 C 56,15 67,16 71,25 C 75,30 73.5,38 68,41" />
    <path d="M 26.5,67 C 28.5,39 45,31.5 58,31.5 C 68,31.5 75,37 79,45 L 65,48.5 C 61,49.5 54,49.5 54,49.5" />
    <path d="M 64.5,49.5 C 55,49.5 51,70 60,73 C 69,76 74,62 65,49 M 63.5,73 L 66,81" />
    <circle cx="58" cy="41.5" r="2.5" fill="currentColor" stroke="none" />
  </g>
</svg>
          <h1 class="text-primary display-4 mt-3">SLH-OP</h1>
        </div>
        <div class="card card-md shadow-sm border-0">
          <div class="card-body">
            <h2 class="h2 text-center mb-4">Login to your account</h2>

            {# Flash messages are already handled by base_tabler.html #}

            <form action="{{ url_for('login') }}" method="POST" autocomplete="off" novalidate>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
              </div>
              <div class="mb-2">
                <label class="form-label">
                  Password
                </label>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
              </div>
              <div class="mb-3">
                <label class="form-check">
                  <input type="checkbox" name="remember" class="form-check-input"/>
                  <span class="form-check-label">Remember me on this device</span>
                </label>
              </div>
              <div class="form-footer">
                <button type="submit" class="btn btn-primary w-100">Sign in</button>
              </div>
            </form>
          </div>
        </div>
        <div class="text-center text-muted mt-4" style="font-size: 0.75rem; opacity: 0.6;">
          <p class="mb-1">Syarikat Sin Long Heng Breeding Farm Sdn Bhd</p>
          <p class="mb-1"><strong>System Status:</strong> Online | <strong>Last Update:</strong> {{ build_date }}</p>
          <p class="mt-1">Build ID: v{{ version }}</p>
        </div>
      </div>
    </div>
{% endblock %}
