<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Login - SLH-OP Dashboard</title>
    <!-- Tabler Core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
    <style>
        :root {
            --tblr-primary: #005eb8; /* Arbor Acres Blue */
        }
    </style>
  </head>
  <body class="d-flex flex-column bg-white">
    <div class="page page-center">
      <div class="container-tight py-4">
        <div class="text-center mb-4">
          <h1 class="text-primary display-4">SLH-OP</h1>
        </div>
        <div class="card card-md shadow-sm border-0">
          <div class="card-body">
            <h2 class="h2 text-center mb-4">Login to your account</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible" role="alert">
                    <div class="d-flex">
                      <div>{{ message }}</div>
                    </div>
                    <a class="btn-close" data-bs-dismiss="alert" aria-label="close"></a>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST" autocomplete="off" novalidate>
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
              </div>
              <div class="mb-2">
                <label class="form-label">
                  Password
                </label>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
              </div>
              <div class="mb-3">
                <label class="form-check">
                  <input type="checkbox" name="remember" class="form-check-input"/>
                  <span class="form-check-label">Remember me on this device</span>
                </label>
              </div>
              <div class="form-footer">
                <button type="submit" class="btn btn-primary w-100">Sign in</button>
              </div>
            </form>
          </div>
        </div>
        <div class="text-center text-muted mt-3">
          Powered by SLH-OP Farm Management
        </div>
      </div>
    </div>
    <!-- Tabler Core JS -->
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
  </body>
</html>
