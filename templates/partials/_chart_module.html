  function calculateAgeWeeks(dateObj) {
      if (!intakeDate) return 0;
      const diffTime = Math.abs(dateObj - intakeDate);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return Math.floor(diffDays / 7) + 1;
  }

  function getLatestDataIndex(dataArray, checkZero = false) {
      if (!dataArray || dataArray.length === 0) return 0;
      for (let i = dataArray.length - 1; i >= 0; i--) {
          const val = dataArray[i];
          if (val !== null && val !== undefined && (!checkZero || val > 0)) {
              return i;
          }
      }
      return 0;
  }

  function filterDataByDate(dataObj, startDate, endDate, isWeekly) {
      if (!dataObj.dates || dataObj.dates.length === 0) return dataObj;
      if (!startDate || !endDate) return dataObj;

      let indices = [];
      const start = new Date(startDate);
      const end = new Date(endDate);
      // Set hours to compare dates only
      start.setHours(0,0,0,0);
      end.setHours(23,59,59,999);

      if (isWeekly) {
          // Weekly data has dates as "Week X"
          // We filter by converting "Week X" to approx Age Week and comparing with selection
          const startAge = calculateAgeWeeks(start);
          const endAge = calculateAgeWeeks(end);

          dataObj.dates.forEach((label, idx) => {
              // Extract number from "Week X"
              const match = label.toString().match(/(\d+)/);
              if (match) {
                  const weekNum = parseInt(match[1]);
                  if (weekNum >= startAge && weekNum <= endAge) {
                      indices.push(idx);
                  }
              }
          });

      } else {
          // Daily data has YYYY-MM-DD
          dataObj.dates.forEach((dateStr, idx) => {
              const d = new Date(dateStr);
              if (d >= start && d <= end) {
                  indices.push(idx);
              }
          });
      }

      if (indices.length === 0) { return dataObj; }

      const firstIdx = indices[0];
      const lastIdx = indices[indices.length - 1];

      const newObj = {};
      for (let key in dataObj) {
          if (Array.isArray(dataObj[key])) {
              newObj[key] = dataObj[key].slice(firstIdx, lastIdx + 1);
          } else {
              newObj[key] = dataObj[key];
          }
      }
      return newObj;
  }


  function generateDailyLabels(dataObj) {
      if (!dataObj || !dataObj.dates) return [];
      return dataObj.dates.map((date, i) => {
          if (dataObj.ages && dataObj.ages[i] !== undefined) {
              const age = dataObj.ages[i];
              let dateStr = date;
              if (dateStr && dateStr.includes('-')) {
                  const parts = dateStr.split('-');
                  if (parts.length === 3) {
                      dateStr = parts[2] + '-' + parts[1];
                  }
              }
              return `${age} (${dateStr})`;
          }
          return date;
      });
  }

  function getScaleOptions(dataArrays, isPercentage) {

      const newDisplay = !currentDisplay;

      // Update button style

      const allFeed = [...(feedM || []), ...(feedF || [])];
      for (const val of allFeed) {

      let yMax = 180;

  // Custom Plugin to dynamically scale y1 axis based on visible datasets
  const dynamicYMaxPlugin = {
      id: 'dynamicYMaxPlugin',
      beforeUpdate(chart, args, options) {
          if (chart.options.scales && chart.options.scales.y1) {
              let currentVisibleMax = 0;
              let hasVisibleData = false;

              chart.data.datasets.forEach((dataset, index) => {
                  // Only check datasets mapped to y1 axis and are currently visible
                  if (dataset.yAxisID === 'y1' && chart.isDatasetVisible(index)) {
                      // Skip baseline data if we only want to scale by actual data points, or include it?
                      // The prompt says "based on the datasets currently visible (toggled on) in the chart."
                      // So we include all visible y1 datasets.
                      const datasetData = dataset.data;
                      if (datasetData && datasetData.length > 0) {
                          // Handle objects {x, y} or numbers
                          const values = datasetData.map(point => {
                              if (point === null || point === undefined) return 0;
                              if (typeof point === 'object' && point.y !== undefined) return point.y;
                              return Number(point);
                          });

                          const maxInDataset = Math.max(...values.filter(v => !isNaN(v)));
                          if (maxInDataset > currentVisibleMax) {
                              currentVisibleMax = maxInDataset;
                          }
                          hasVisibleData = true;
                      }
                  }
              });

              if (hasVisibleData && currentVisibleMax > 0) {
                  // Apply 1.25x Headroom and use Math.ceil
                  chart.options.scales.y1.max = Math.ceil(currentVisibleMax * 1.25);
                  chart.options.scales.y1.min = 0; // Ensure zero-baseline
              } else {
                  // Fallback if no data or all hidden
                  chart.options.scales.y1.max = 1; // Arbitrary low positive number
                  chart.options.scales.y1.min = 0;
              }
          }
      }
  };

  function updateChartTitle(elementId, baseTitle, dataObj, isDaily) {
      const titleEl = document.getElementById(elementId);
      if (!titleEl) return;

      let startAge = '?', endAge = '?';
      let startDate = '', endDate = '';

      if (dataObj && dataObj.dates && dataObj.dates.length > 0) {
          const count = dataObj.dates.length;
          startDate = dataObj.dates[0];
          endDate = dataObj.dates[count - 1];

          if (!isDaily) {
               startAge = startDate;
               endAge = endDate;
          } else {
               if (dataObj.ages && dataObj.ages.length > 0) {
                   startAge = dataObj.ages[0];
                   endAge = dataObj.ages[dataObj.ages.length - 1];
               } else {
                   startAge = "W" + calculateAgeWeeks(new Date(startDate));
                   endAge = "W" + calculateAgeWeeks(new Date(endDate));
               }
          }
      }

      function formatToDDMMYY(dateStr) {
          if (!dateStr || !dateStr.includes('-')) return dateStr;
          const parts = dateStr.split('-');
          if (parts.length === 3) {
             return `${parts[2]}-${parts[1]}-${parts[0].slice(2)}`;
          }
          return dateStr;
      }

      let dynamicText = `${baseTitle} - [${flockHouseName}`;
      if (startAge !== '?' && endAge !== '?') {
          dynamicText += ` (${startAge} to ${endAge}`;
          if (isDaily && startDate && endDate) {
              dynamicText += ` - ${formatToDDMMYY(startDate)} to ${formatToDDMMYY(endDate)}`;
          }
          dynamicText += `)`;
      }
      dynamicText += `]`;

      titleEl.innerText = dynamicText;
  }

              endDateDefault = lastLogDate;

              startDateDefault.setDate(endDateDefault.getDate() - 30);

      if (intakeDate && startDateDefault < intakeDate) {
          startDateDefault = new Date(intakeDate);
      }

      // 1. Initialize Global Vars
      globalPickerStart = startDateDefault;
      globalPickerEnd = endDateDefault;

      // Helper function to format Date object to YYYY-MM-DD
      function formatDate(date) {
        if (!date) return '';
        const d = new Date(date);
        let month = '' + (d.getMonth() + 1),
            day = '' + d.getDate(),
            year = d.getFullYear();

        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;

        return [year, month, day].join('-');
      }

      // 2. Helper to set individual pickers (Now Native)
      function initChartPickers(key, renderFunc) {
          // Defaults
          chartStates[key].start = globalPickerStart;
          chartStates[key].end = globalPickerEnd;

          const startEl = document.getElementById(`start_${key}`);
          const endEl = document.getElementById(`end_${key}`);

          // Set Initial Values
          if (startEl) startEl.value = formatDate(globalPickerStart);
          if (endEl) endEl.value = formatDate(globalPickerEnd);

          // Add Change Listeners
          const updateFunc = function() {
               const sVal = startEl.value;
               const eVal = endEl.value;

               if (sVal && eVal) {
                   // Append time to force local time parsing or ensure consistency
                   // Native input returns YYYY-MM-DD. new Date("YYYY-MM-DD") is UTC.
                   // We want start of day in local time or consistent with how data is filtered.
                   // Adding T00:00:00 often forces local time parsing in browsers.
                   chartStates[key].start = new Date(sVal + 'T00:00:00');
                   chartStates[key].end = new Date(eVal + 'T00:00:00');
                   renderFunc();
               }
          };

          if (startEl) startEl.addEventListener('change', updateFunc);
          if (endEl) endEl.addEventListener('change', updateFunc);
      }

      // 3. Initialize Specific Pickers
      initChartPickers('general', renderGeneralChart);
      initChartPickers('hatching', renderHatchingChart);
      initChartPickers('water', renderWaterChart);
      initChartPickers('feed', renderFeedChart);
      initChartPickers('male', renderMaleChart);
      initChartPickers('female', renderFemaleChart);

      // 4. Initialize Global Picker
      const commonFlatpickrConfig = {
          dateFormat: "Y-m-d",
          // disableMobile: "true", // Removed to allow native mobile picker
          onChange: function(selectedDates, dateStr, instance) {
              updateGlobalDateRange();
          }
      };

      const fpStart = flatpickr("#startDateSlicer", {
          ...commonFlatpickrConfig,
          defaultDate: startDateDefault
      });

      const fpEnd = flatpickr("#endDateSlicer", {
          ...commonFlatpickrConfig,
          defaultDate: endDateDefault
      });

      function updateGlobalDateRange() {
          const startDates = fpStart.selectedDates;
          const endDates = fpEnd.selectedDates;

          if (startDates.length > 0 && endDates.length > 0) {
              globalPickerStart = startDates[0];
              globalPickerEnd = endDates[0];

              // Update Age Display
              const startAge = calculateAgeWeeks(globalPickerStart);
              const endAge = calculateAgeWeeks(globalPickerEnd);
              document.getElementById('ageRangeDisplay').innerText = `Age: W${startAge} - W${endAge}`;

              // Update ALL individual states and re-render
              Object.keys(chartStates).forEach(key => {
                  chartStates[key].start = globalPickerStart;
                  chartStates[key].end = globalPickerEnd;

                  // Update UI (Native Inputs)
                  const startEl = document.getElementById(`start_${key}`);
                  const endEl = document.getElementById(`end_${key}`);
                  if (startEl) startEl.value = formatDate(globalPickerStart);
                  if (endEl) endEl.value = formatDate(globalPickerEnd);
              });

              renderGeneralChart();
              renderHatchingChart();
              renderWaterChart();
              renderFeedChart();
              renderMaleChart();
              renderFemaleChart();
          }
      }

      // 5. Initial Render
      const startAge = calculateAgeWeeks(globalPickerStart);
      const endAge = calculateAgeWeeks(globalPickerEnd);
      document.getElementById('ageRangeDisplay').innerText = `Age: W${startAge} - W${endAge}`;

      renderGeneralChart();
      renderHatchingChart();
      renderWaterChart();
      renderFeedChart();
      renderMaleChart();

          text = arguments[1];
          photos = arguments[2];
      } else {
          date = pt.date;
          text = pt.main_note || pt.note; // Fallback
          main_photos = pt.main_photos || pt.photos || [];

                  photos: note.photos || []

      if (slides.length === 0) {

          slides.push({title: "Info", caption: "No data.", photos: []});

      slides.forEach((slide, index) => {
          const div = document.createElement('div');
          div.className = 'carousel-item' + (index === 0 ? ' active' : '');

          let photosHtml = '';

            </div>
          `;
          inner.appendChild(div);
      });

      const modal = new bootstrap.Modal(document.getElementById('noteModal'));
      modal.show();
  }

// --- Floating Notes Logic ---
let activeAddNoteChart = null;
let allFloatingNotes = [];

function toggleAddNoteMode(chartId) {
    if (activeAddNoteChart === chartId) {
        activeAddNoteChart = null;
        document.querySelectorAll(`button[onclick="toggleAddNoteMode('${chartId}')"]`).forEach(btn => {
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-outline-secondary');
        });
    } else {
        if (activeAddNoteChart) {
            document.querySelectorAll(`button[onclick="toggleAddNoteMode('${activeAddNoteChart}')"]`).forEach(btn => {
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-outline-secondary');
            });
        }
        activeAddNoteChart = chartId;
        document.querySelectorAll(`button[onclick="toggleAddNoteMode('${chartId}')"]`).forEach(btn => {
            btn.classList.remove('btn-outline-secondary');
            btn.classList.add('btn-primary');
        });
    }
}

const floatingNotePlugin = {
    id: 'floatingNoteInteraction',
    afterEvent(chart, args) {
        if (args.event.type === 'click') {
            const chartId = chart.canvas.id;

            if (activeAddNoteChart === chartId) {
                const xVal = chart.scales.x.getValueForPixel(args.event.x);
                const yVal = chart.scales.y.getValueForPixel(args.event.y);

                let xLabel = xVal;
                if (chart.data.labels && chart.data.labels[xVal] !== undefined) {
                    xLabel = chart.data.labels[xVal];
                }

                toggleAddNoteMode(chartId); // turn off mode

                const noteText = prompt("Enter note text:");
                if (noteText && noteText.trim() !== '') {
                    const payload = {
                        flock_id: {{ flock.id }},
                        chart_id: chartId,
                        x_value: String(xLabel),
                        y_value: yVal,
                        content: noteText.trim()
                    };

                    fetch('/api/floating_notes', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(r => r.json())
                    .then(res => {
                        if (res.success) {
                            payload.id = res.id;
                            allFloatingNotes.push(payload);
                            updateChartAnnotations(chart);
                        } else {
                            alert("Failed to save note: " + res.error);
                        }
                    });
                }
            }
        }
    }
};

Chart.register(floatingNotePlugin);

function updateChartAnnotations(chart) {
    if (!chart) return;
    const chartId = chart.canvas.id;
    const chartNotes = allFloatingNotes.filter(n => n.chart_id === chartId);

    if (!chart.options.plugins) chart.options.plugins = {};
    if (!chart.options.plugins.annotation) chart.options.plugins.annotation = {};
    if (!chart.options.plugins.annotation.annotations) chart.options.plugins.annotation.annotations = {};

    const currentAnns = chart.options.plugins.annotation.annotations;
    const newAnnotations = Array.isArray(currentAnns) ? {} : { ...currentAnns };

    for (const key of Object.keys(newAnnotations)) {
        if (key.startsWith('note_')) {
            delete newAnnotations[key];
        }
    }

    chartNotes.forEach(note => {
        newAnnotations['note_' + note.id] = {
            type: 'label',
            xValue: note.x_value,
            yValue: note.y_value,
            content: note.content,
            backgroundColor: 'rgba(255, 255, 255, 0.9)',
            color: 'black',
            borderWidth: 0,
            borderRadius: 4,
            padding: 4,
            font: { size: 12 },
            callout: { display: false },
            click: function(ctx) {
                if (activeAddNoteChart) return;
                if (confirm('Delete this note: "' + note.content + '"?')) {
                    fetch('/api/floating_notes/' + note.id, { method: 'DELETE' })
                    .then(r => r.json())
                    .then(res => {
                        if (res.success) {
                            allFloatingNotes = allFloatingNotes.filter(n => n.id !== note.id);
                            updateChartAnnotations(chart);
                        } else {
                            alert("Failed to delete note.");
                        }
                    });
                }
            }
        };
    });

    chart.options.plugins.annotation.annotations = newAnnotations;
    chart.update();
}

function fetchAndApplyFloatingNotes() {
    fetch('/api/floating_notes/{{ flock.id }}')
    .then(r => {
        if (!r.ok || r.redirected) {
            console.error("Failed to fetch floating notes");
            return [];
        }
        return r.json().catch(() => {
            console.error("Failed to fetch floating notes");
            return [];
        });
    })    .then(data => {
        allFloatingNotes = data;
        const chartsToUpdate = [];
        if (typeof generalChart !== 'undefined') chartsToUpdate.push(generalChart);
        if (typeof waterChart !== 'undefined') chartsToUpdate.push(waterChart);
        if (typeof feedChart !== 'undefined') chartsToUpdate.push(feedChart);
        if (typeof maleChart !== 'undefined') chartsToUpdate.push(maleChart);
        if (typeof femaleChart !== 'undefined') chartsToUpdate.push(femaleChart);
        if (typeof hatchingEggChart !== 'undefined') chartsToUpdate.push(hatchingEggChart);
        if (typeof targetChart !== 'undefined') chartsToUpdate.push(targetChart);
        if (typeof hatchChart !== 'undefined') chartsToUpdate.push(hatchChart);

        chartsToUpdate.forEach(c => {
            if (c) updateChartAnnotations(c);
        });
    });
}

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(fetchAndApplyFloatingNotes, 1500);
});

</script>
