{% extends "base_tabler.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="text-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="slh-logo-static" width="80" height="80">
            <g fill="none" stroke="#005eb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 34 46 C 25 35 25 15 45 20 C 50 5 70 5 75 25 C 85 25 85 45 68 47" />
              <path d="M 28 65 C 28 35 45 35 60 35 C 65 35 70 38 75 42 C 80 44 85 46 90 50 L 68 52" />
              <path d="M 68 52 C 55 55 55 75 62 82 C 70 90 85 75 75 60 C 73 55 68 52 68 52 Z" />
              <path d="M 70 82 L 72 95" />
              <circle cx="62" cy="42" r="4" fill="#005eb8" stroke="none" />
            </g>
          </svg>
        </div>
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">SLH-OP Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me for 30 days</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted text-center small">
                <p class="mb-0">Protected System. Authorized Personnel Only.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
