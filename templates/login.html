{% extends "base_tabler.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="text-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="slh-logo-static" width="80" height="80">
            <g fill="none" stroke="#005eb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 40,36 C 31,36 29,22 39,18 C 45,15.5 48.5,17 51,21 C 56,15 67,16 71,25 C 75,30 73.5,38 68,41" />
              <path d="M 26.5,67 C 28.5,39 45,31.5 58,31.5 C 68,31.5 75,37 79,45 L 65,48.5 C 61,49.5 54,49.5 54,49.5" />
              <path d="M 64.5,49.5 C 55,49.5 51,70 60,73 C 69,76 74,62 65,49 M 63.5,73 L 66,81" />
              <circle cx="58" cy="41.5" r="2.5" fill="#005eb8" stroke="none" />
            </g>
          </svg>
        </div>
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">SLH-OP Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me for 30 days</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted text-center small">
                <p class="mb-0">Protected System. Authorized Personnel Only.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
