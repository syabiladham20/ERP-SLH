{% extends "base_tabler.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="text-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="slh-logo-static" width="80" height="80">
            <g fill="none" stroke="#005eb8" stroke-width="3" stroke-linecap="round">
              <path d="M42 22c2-7 7-7 9 0m0 0c2-5 7-5 9 0m0 0c2-3 7-3 9 0m0 0c2-3 7-3 9 0m0 0c2-5 7-5 9 0"/> <path d="M12 72c3-30 45-30 70-30"/> <path d="M15 72c4-15 17-20 27-10"/> <circle cx="27" cy="52" r="3" fill="#005eb8" stroke="none"/> </g>
          </svg>
        </div>
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">SLH-OP Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me for 30 days</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted text-center small">
                <p class="mb-0">Protected System. Authorized Personnel Only.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
