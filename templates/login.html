{% extends "base_tabler.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="text-center mb-4">
            <svg width="80" height="80" viewBox="0 0 100 100" class="text-primary">
                <path d="M 33,29 L 36,15 L 42,21 L 46,9 L 52,19 L 57,13 L 60,30" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M 65,75 C 65,50 55,35 35,30 C 25,28 14,35 9,45 L 20,49 L 16,53 C 25,48 30,50 28,58 Q 40,55 50,65 Q 60,75 65,75" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M 28,58 Q 22,70 32,73 Q 36,65 32,58" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="38" cy="45" r="3" fill="currentColor" />
            </svg>
        </div>
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">SLH-OP Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me for 30 days</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted text-center small">
                <p class="mb-0">Protected System. Authorized Personnel Only.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
